# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Paper Trading Rebuild
#
# On push or PR to main, runs:
#   ✅ Guardrail tests          (test name: "guardrails")
#   ✅ Bug regression tests     (test name: "bug-regression")
#   ✅ JS syntax check          (test name: "js-syntax")
#   ✅ No bare except blocks    (test name: "no-bare-except")
#   ✅ No orphaned top-level JS (test name: "no-orphaned-js")
#   ✅ Docker build             (test name: "docker-build")
#
# ── Branch Protection Setup (configure in GitHub repo settings) ─────────────
#
# After this workflow has run at least once, go to:
#   Settings → Branches → Add rule (or edit "main")
#
# Required settings:
#   ☑ Require a pull request before merging
#   ☑ Require status checks before merging
#   ☑ Require branches to be up-to-date
#
# Required status checks (must match job step names exactly):
#   guardrails
#   bug-regression
#   js-syntax
#   no-bare-except
#   no-orphaned-js
#   docker-build
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: 1

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Guardrail tests ────────────────────────────────────────────────────

      - name: guardrails
        run: PYTHONPATH=src python3 tests/test_guardrails.py

      # ── Bug regression tests ───────────────────────────────────────────────

      - name: bug-regression
        run: PYTHONPATH=src python3 tests/test_bug_regression.py

      # ── JS syntax check ────────────────────────────────────────────────────

      - name: js-syntax
        run: |
          JS_FILES=$(find src/leaderboard_ui/ -name "*.js" -type f 2>/dev/null)
          if [ -z "$JS_FILES" ]; then
            echo "No JS files found in src/leaderboard_ui/ — skipping"
          else
            for f in $JS_FILES; do
              echo "Checking: $f"
              node --check "$f"
            done
            echo "All JS files pass syntax check"
          fi

      # ── Bare except block check ────────────────────────────────────────────

      - name: no-bare-except
        run: |
          FOUND=$(grep -rn "except.*pass" src/ || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Found bare except:pass blocks in src/:"
            echo "$FOUND"
            exit 1
          fi
          echo "No bare except:pass blocks found"

      # ── Orphaned top-level JS in HTML ──────────────────────────────────────

      - name: no-orphaned-js
        run: |
          python3 << 'PYEOF'
          import pathlib, re, sys
          root = pathlib.Path("src/leaderboard_ui")
          failed = False
          for html_file in sorted(root.rglob("*.html")):
              html = html_file.read_text()
              scripts = re.findall(r'<script[^>]*>(.*?)</script>', html, re.DOTALL)
              for i, script in enumerate(scripts):
                  lines = script.split('\n')
                  for j, line in enumerate(lines):
                      stripped = line.strip()
                      if not stripped or stripped.startswith('//') or stripped.startswith('/*'):
                          continue
                      if stripped.startswith('for ') and 'of' in stripped:
                          preceding = '\n'.join(lines[:j])
                          depth = preceding.count('{') - preceding.count('}')
                          if depth == 0:
                              m = re.match(r'for\s+\(?\s*\w+\s+of\s+(\w+)', stripped)
                              if m:
                                  var = m.group(1)
                                  if not re.findall(rf'(?:let|const|var)\s+{re.escape(var)}\b', script):
                                      print(f"FAIL: {html_file.name} script block {i}, line {j+1}: "
                                            f"orphaned top-level for-loop referencing '{var}'")
                                      failed = True
          if failed:
              sys.exit(1)
          print("No orphaned top-level JS found")
          PYEOF

      # ── Docker build validation ────────────────────────────────────────────

      - name: docker-build
        run: |
          if [ -f Dockerfile.leaderboard ]; then
            DOCKERFILE="Dockerfile.leaderboard"
          elif [ -f infra/docker/dashboard/Dockerfile ]; then
            DOCKERFILE="infra/docker/dashboard/Dockerfile"
            echo "Note: Dockerfile.leaderboard not found, using infra/docker/dashboard/Dockerfile"
          else
            DOCKERFILE="Dockerfile"
            echo "Note: Using main Dockerfile"
          fi
          echo "Building: $DOCKERFILE"
          docker build --network host -t test-build -f "$DOCKERFILE" .
          echo "Docker build succeeded"
