# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — Paper Trading Rebuild
#
# Two-phase pipeline:
#   Phase 1: ci — Unit tests, lint checks, Docker build validation
#   Phase 2: integration — Docker Compose stack + Playwright E2E tests
#
# Runs on push or PR to main. All checks must pass before merging.
#
# ── Branch Protection Setup (configure in GitHub repo settings) ─────────────
#
# After this workflow has run at least once, go to:
#   Settings → Branches → Add rule (or edit "main")
#
# Required settings:
#   ☑ Require a pull request before merging
#   ☑ Require status checks before merging
#   ☑ Require branches to be up-to-date
#
# Required status checks (exact step/job names to add):
#   ci / guardrails
#   ci / bug-regression
#   ci / js-syntax
#   ci / no-bare-except
#   ci / no-orphaned-js
#   ci / docker-build
#   integration / integration-tests
#   integration / e2e
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: 1
  COMPOSE_FILE: docker-compose.test.yml

jobs:
  # ── Phase 1: Unit tests, lint checks, static analysis ──────────────────────

  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: guardrails
        run: PYTHONPATH=src python3 tests/test_guardrails.py

      - name: bug-regression
        run: PYTHONPATH=src python3 tests/test_bug_regression.py

      - name: js-syntax
        run: |
          JS_FILES=$(find src/leaderboard_ui/ -name "*.js" -type f 2>/dev/null)
          if [ -z "$JS_FILES" ]; then
            echo "No JS files found in src/leaderboard_ui/ — skipping"
          else
            for f in $JS_FILES; do
              echo "Checking: $f"
              node --check "$f"
            done
            echo "All JS files pass syntax check"
          fi

      - name: no-bare-except
        run: |
          FOUND=$(grep -rn "except.*pass" src/ || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Found bare except:pass blocks in src/:"
            echo "$FOUND"
            exit 1
          fi
          echo "No bare except:pass blocks found"

      - name: no-orphaned-js
        run: |
          python3 << 'PYEOF'
          import pathlib, re, sys
          root = pathlib.Path("src/leaderboard_ui")
          failed = False
          for html_file in sorted(root.rglob("*.html")):
              html = html_file.read_text()
              scripts = re.findall(r'<script[^>]*>(.*?)</script>', html, re.DOTALL)
              for i, script in enumerate(scripts):
                  lines = script.split('\n')
                  for j, line in enumerate(lines):
                      stripped = line.strip()
                      if not stripped or stripped.startswith('//') or stripped.startswith('/*'):
                          continue
                      if stripped.startswith('for ') and 'of' in stripped:
                          preceding = '\n'.join(lines[:j])
                          depth = preceding.count('{') - preceding.count('}')
                          if depth == 0:
                              m = re.match(r'for\s+\(?\s*\w+\s+of\s+(\w+)', stripped)
                              if m:
                                  var = m.group(1)
                                  if not re.findall(rf'(?:let|const|var)\s+{re.escape(var)}\b', script):
                                      print(f"FAIL: {html_file.name} script block {i}, line {j+1}: "
                                            f"orphaned top-level for-loop referencing '{var}'")
                                      failed = True
          if failed:
              sys.exit(1)
          print("No orphaned top-level JS found")
          PYEOF

      - name: docker-build
        run: |
          if [ -f Dockerfile.leaderboard ]; then
            DOCKERFILE="Dockerfile.leaderboard"
          elif [ -f infra/docker/dashboard/Dockerfile ]; then
            DOCKERFILE="infra/docker/dashboard/Dockerfile"
            echo "Note: Dockerfile.leaderboard not found, using infra/docker/dashboard/Dockerfile"
          else
            DOCKERFILE="Dockerfile"
            echo "Note: Using main Dockerfile"
          fi
          echo "Building: $DOCKERFILE"
          docker build --network host -t test-build -f "$DOCKERFILE" .
          echo "Docker build succeeded"

  # ── Phase 2: Integration tests (Docker Compose stack + Playwright E2E) ────

  integration:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Compose test stack
        run: |
          docker compose -f docker-compose.test.yml up --build -d

      - name: Wait for dashboard to be healthy
        run: |
          echo "Waiting for dashboard to be ready..."
          for i in $(seq 1 60); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' test-dashboard 2>/dev/null || echo "starting")
            if [ "$STATUS" = "healthy" ]; then
              echo "Dashboard is healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for dashboard"
              docker compose -f docker-compose.test.yml logs --tail=50
              exit 1
            fi
            sleep 2
          done

      - name: Verify seed data loaded
        run: |
          RESPONSE=$(curl -sf http://localhost:5002/api/traders 2>&1 || echo "FAILED")
          if [ "$RESPONSE" = "FAILED" ]; then
            echo "ERROR: /api/traders endpoint not responding"
            docker compose -f docker-compose.test.yml logs dashboard --tail=30
            exit 1
          fi
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          traders = data.get('traders', [])
          print(f'Got {len(traders)} traders')
          for t in traders:
              print(f'  {t[\"id\"]}: portfolio={t.get(\"portfolio_value\")}')
          assert len(traders) >= 1, 'Expected at least 1 trader'
          assert any(t.get('portfolio_value') for t in traders), 'Expected portfolio values'
          "

      - name: Set up Python 3.12 for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps for integration tests
        run: |
          pip install -r requirements.txt
          pip install psycopg2-binary

      - name: integration-tests
        env:
          CI: "true"
          DATA_BUS_URL: http://data-bus:5000
          DASHBOARD_URL: http://dashboard:5002
          PG_DSN: host=localhost port=5432 dbname=trading user=trader
        run: |
          mkdir -p logs/test-results
          python3 -m pytest tests/integration/ \
            -x --timeout=60 \
            --junitxml=logs/test-results/integration.xml \
            2>&1 | tee logs/test-results/integration.log

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            logs/test-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install @playwright/test@latest
          npx playwright install chromium --with-deps

      - name: e2e
        env:
          DASHBOARD_URL: http://localhost:5002
          DATA_BUS_URL: http://data-bus:5000
        run: |
          mkdir -p test-results
          npx playwright test --reporter=html,github 2>&1 | tee test-results/e2e-output.log

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: |
            playwright-report/
            test-results/e2e-report/
            test-results/e2e-output.log
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            test-results/
          retention-days: 7

      - name: Dump service logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.test.yml logs --tail=100 trading-db data-bus dashboard seed

      - name: Tear down Docker Compose stack
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v --remove-orphans