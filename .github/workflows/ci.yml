name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov pytest-json-report pytest-timeout
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests (homelab-independent only)
        run: |
          mkdir -p test-results
          pytest tests/ -v --tb=short \
            --ignore=tests/test_fundamentals.py \
            --ignore=tests/test_data_bus_smoke.py \
            --ignore=tests/test_nightly_pipeline.py \
            --ignore=tests/test_aldridge_strategy.py \
            --ignore=tests/test_learning_loop.py \
            -k "not (test_insert or test_store or test_load or test_backfill or test_db or test_connection or test_schema or test_ARCH)" \
            --junitxml=test-results/junit.xml \
            --json-report --json-report-file=test-results/report.json \
            2>&1 | tee test-results/pytest.log
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
