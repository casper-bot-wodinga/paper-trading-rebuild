name: Test

on:
  push:
    branches: [hermes/spec-driven-rebuild]
  pull_request:
    branches: [hermes/spec-driven-rebuild]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Set paper trading credentials
        env:
          ALPACA_KAIROS_KEY: ${{ secrets.ALPACA_KAIROS_KEY }}
          ALPACA_KAIROS_SECRET: ${{ secrets.ALPACA_KAIROS_SECRET }}
        run: |
          echo "PAPER=true" >> $GITHUB_ENV

      - name: Init test DB
        run: |
          python3 -c "
          import sqlite3, os
          db = 'shared/trader.db'
          if os.path.exists(db): os.remove(db)
          conn = sqlite3.connect(db)
          conn.execute('PRAGMA journal_mode=WAL')
          if os.path.exists('shared/schema.sql'):
              with open('shared/schema.sql') as f:
                  conn.executescript(f.read())
          conn.close()
          "
          python3 scripts/seed_timescale_params.py 2>&1 | tail -3
          python3 scripts/seed_risk_params.py 2>&1 | tail -3

      - name: Run tests
        run: |
          python3 -c "
          import subprocess, sys
          with open('ci_skip.txt') as f:
              skips = [l.strip() for l in f if l.strip() and not l.startswith('#')]
          filter_str = ' and '.join(f'not {s}' for s in skips)
          result = subprocess.run(
              ['python', '-m', 'pytest', 'tests/', '-v', '--tb=short', '-k', filter_str],
              capture_output=False
          )
          sys.exit(result.returncode)
          "

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ --cov=src/ --cov-report=term

      - name: CI enforcement checks
        run: |
          python3 scripts/ci_checks.py
