# Paper Trading Services — docker.klo deployment
# Core trading stack only. Canvas + chat-bridge are separate general services.

services:
  # ── Postgres (port 5433 external → 5432 internal) ────────────────────
  trading-db:
    image: pgvector/pgvector:pg15
    container_name: trading-db
    restart: unless-stopped
    dns:
      - 192.168.1.25
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=trading
      - POSTGRES_USER=trader
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - trading_pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "trader", "-d", "trading"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Data Bus (port 5000) ─────────────────────────────────────────────
  data-bus:
    build:
      context: ./paper-trading-rebuild
      dockerfile: Dockerfile
    container_name: trading-data-bus
    restart: unless-stopped
    ports:
      - "5000:5000"
    dns:
      - 192.168.1.25
    environment:
      - PYTHONUNBUFFERED=1
      - ALPACA_KAIROS_KEY=${ALPACA_KAIROS_KEY}
      - ALPACA_KAIROS_SECRET=${ALPACA_KAIROS_SECRET}
      - ALPACA_ALDRIDGE_KEY=${ALPACA_ALDRIDGE_KEY}
      - ALPACA_ALDRIDGE_SECRET=${ALPACA_ALDRIDGE_SECRET}
      - ALPACA_STONKS_KEY=${ALPACA_STONKS_KEY}
      - ALPACA_STONKS_SECRET=${ALPACA_STONKS_SECRET}
      - KAIROS_API_KEY=${KAIROS_API_KEY}
      - KAIROS_SECRET_KEY=${KAIROS_SECRET_KEY}
      - ALDRIDGE_API_KEY=${ALDRIDGE_API_KEY}
      - ALDRIDGE_SECRET_KEY=${ALDRIDGE_SECRET_KEY}
      - STONKS_API_KEY=${STONKS_API_KEY}
      - STONKS_SECRET_KEY=${STONKS_SECRET_KEY}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - PGHOST=trading-db
      - MCP_PORT=5001
    volumes:
      - data-bus-cache:/app/shared
    working_dir: /app
    command: python3 src/data_bus.py --port 5000 --host 0.0.0.0
    depends_on:
      trading-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Dashboard (port 5004) ────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-dashboard
    restart: unless-stopped
    ports:
      - "5004:5004"
    dns:
      - 192.168.1.25
    environment:
      - PG_DSN=host=trading-db port=5432 dbname=trading user=trader
      - PYTHONUNBUFFERED=1
    working_dir: /app
    command: python3 src/pg_dashboard.py
    depends_on:
      trading-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/api/summary"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data-bus-cache:
  trading_pgdata:

networks:
  default:
    external:
      name: trading-net
