# Paper Trading Services — docker.klo deployment
# Deploy from paper-trading-rebuild root:
#   scp docker-compose.yml raf@docker.klo:~/trading/
#   rsync -avz ./paper-trading-rebuild/ raf@docker.klo:~/trading/paper-trading-rebuild/
#   rsync -avz ./paper-trading-teams/ raf@docker.klo:~/trading/paper-trading-teams/
#   ssh raf@docker.klo 'cd ~/trading && docker compose up -d --build'

services:
  # ── Data Bus (port 5000) ─────────────────────────────────────────────
  data-bus:
    build:
      context: ../paper-trading-teams
      dockerfile: Dockerfile
    container_name: trading-data-bus
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - APCA_API_KEY_ID=${APCA...-}
      - APCA_API_SECRET_KEY=${APCA...-}
      - KAIROS_API_KEY=${KAIR...-}
      - KAIROS_SECRET_KEY=${KAIR...-}
      - ALDRIDGE_API_KEY=${ALDR...-}
      - ALDRIDGE_SECRET_KEY=${ALDR...-}
      - STONKS_API_KEY=${STON...-}
      - STONKS_SECRET_KEY=${STON...-}
      - FINNHUB_API_KEY=${FINN...-}
      - FRED_API_KEY=${FRED...-}
      - OPENROUTER_API_KEY=${OPEN...-}
      - MCP_PORT=5001
    volumes:
      - data-bus-cache:/app/shared
    working_dir: /app
    command: python3 src/data_bus.py --port 5000 --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Dashboard (port 5004) ────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-dashboard
    restart: unless-stopped
    ports:
      - "5004:5004"
    environment:
      - PG_DSN=host=trading-db port=5432 dbname=trading user=trader
      - PYTHONUNBUFFERED=1
    working_dir: /app
    command: python3 src/pg_dashboard.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/api/summary"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Chat Bridge (port 8080, exposed as 8644) ─────────────────────────
  chat-bridge:
    build:
      context: ../paper-trading-teams
      dockerfile: Dockerfile.chat-bridge
    container_name: trading-chat-bridge
    restart: unless-stopped
    ports:
      - "8644:8080"
      - "8081:8081"
    environment:
      - CHAT_HOST=0.0.0.0
      - CHAT_PORT=8080
      - CHAT_UI_PORT=8081
      - HERMES_URL=http://192.168.1.131:8080/send
      - HERMES_CHAT_TOKEN=${HERM...-}
      - PYTHONUNBUFFERED=1
    volumes:
      - chat-data:/app/shared
    working_dir: /app
    command: python3 src/chat-server.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # Canvas — already running, just network-attached
  canvas:
    image: ghcr.io/tesselation-studios/canvas:latest
    container_name: trading-canvas
    restart: unless-stopped

volumes:
  data-bus-cache:
  chat-data:

networks:
  default:
    external:
      name: trading-net
