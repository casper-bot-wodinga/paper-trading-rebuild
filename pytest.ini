[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=logs/test-results/junit.xml
    --junit-prefix=paper-trading
    -p no:cacheprovider
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that interact with Docker services
    e2e: marks end-to-end Playwright tests
    smoke: fast smoke tests
    nightly: nightly pipeline tests
    learning: learning loop tests
    replay: replay harness tests