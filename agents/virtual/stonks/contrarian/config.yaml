name: Stonks Contrarian
base_trader: stonks
variant_type: contrarian
description: Anti-crowd sentiment — buy dips, short peaks, contrarian signals

model:
  primary: openrouter/deepseek/deepseek-v4-flash

risk:
  max_position_pct: 0.08
  max_exposure_pct: 0.50
  stop_loss_pct: 0.05
  max_daily_loss: 300
  cash_reserve: 2000
  min_shares_per_position: 1
  max_positions: 4
  allow_short: true

signals:
  momentum_weight: 0.15
  sentiment_weight: 0.65
  regime_weight: 0.20
  minimum_confidence: 0.35
  confirmations_required: 1

social_sentiment:
  volume_spike_threshold: 3.0
  sentiment_positive_threshold: 0.80
  sentiment_negative_threshold: 0.20
  min_mention_spike: 5.0
  contrarian_mode: true
  unusual_options_volume: true

exit_rules:
  profit_target_pct: 0.15
  max_hold_days: 3
  stale_days: 2

evaluation:
  eval_window_days: 3
  objective_metric: total_return